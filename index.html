<!DOCTYPE html>

<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Number from Google Sheet</title>

  <style>

    body {

      font-family: Arial, sans-serif;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;

      margin: 0;

      background: #f0f0f0;

    }

    #number {

      font-size: 6rem;

      font-weight: bold;

      padding: 30px 60px;

      background: white;

      border-radius: 16px;

      box-shadow: 0 10px 30px rgba(0,0,0,0.15);

      min-width: 180px;

      text-align: center;

    }

  </style>

</head>

<body>


  <div id="number">...</div>


  <script>

    // ────────────────────────────────────────────────

    //  Replace only this line with your Sheet ID

    const SHEET_ID = "1D8ZkBHnv601tL9uiLo6aC-hVAqRCLcFcnST8TCIjh_s";  

    // ────────────────────────────────────────────────


    const SHEET_GID = "0";   // usually 0 = first sheet. Change only if needed.

    const CELL = "A1";


    const url = `https://spreadsheets.google.com/feeds/cells/${SHEET_ID}/${SHEET_GID}/public/values/${CELL}?alt=json-in-script`;


    function updateNumber() {

      fetch(url, { mode: 'cors' })

        .then(r => {

          if (!r.ok) throw new Error("Network / publish problem");

          return r.text();

        })

        .then(text => {

          // Very primitive JSONP-like parsing (no library needed)

          const match = text.match(/google\.spreadsheets\.feed\.entry\s*=\s*(\[.*?\]);/s);

          if (!match) throw new Error("Unexpected format");


          const entry = JSON.parse(match[1])[0];

          const value = entry?.gs$cell?.inputValue || entry?.content?.$t || "?";


          document.getElementById("number").textContent = value;

        })

        .catch(err => {

          console.error(err);

          document.getElementById("number").textContent = "Error";

          document.getElementById("number").style.color = "red";

        });

    }


    // Load immediately

    updateNumber();


    // Refresh every 10 seconds (change to 5000 for 5 sec, etc.)

    setInterval(updateNumber, 10000);

  </script>


</body>

</html>
